<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Moon's Notes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fff1e5">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" style="display:none">
  <button id="menu-toggle">☰</button>

  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>
        Moon's Notes
        <span style="display:flex;align-items:center;gap:6px;">
          <button class="btn-backup" id="btn-backup" title="백업">💾</button>
          <button class="btn-backup" id="btn-sync" title="동기화">⟳</button>
          <span id="sync-status">오프라인</span>
        </span>
      </h1>
      <div id="save-sync-times">
        <span id="last-saved-time"></span>
        <span id="last-synced-time"></span>
      </div>
      <div id="search-row">
        <input type="text" id="search-box" placeholder="메모 검색...">
        <button class="btn-search-key" id="btn-master-unlock" title="Master로 전체 잠금 해제">🔑</button>
      </div>
      <div id="sidebar-actions">
        <button class="btn btn-primary" id="btn-new">+New</button>
        <button class="btn btn-fav-filter" id="btn-fav-filter" title="즐겨찾기 필터">☆</button>
        <button class="btn btn-secondary" id="btn-folder-toggle" title="폴더 필터">📁 전체</button>
      </div>
      <div id="sidebar-actions-row2">
        <select id="memo-sort" title="정렬">
          <option value="updatedAt">수정일순</option>
          <option value="createdAt">생성일순</option>
          <option value="title">제목순</option>
        </select>
        <button class="btn btn-select-mode" id="btn-select-mode" title="선택 모드">☑</button>
      </div>
      <div id="bulk-actions" style="display:none">
        <button class="btn btn-secondary" id="btn-bulk-move">📁 이동</button>
        <button class="btn btn-primary" id="btn-bulk-delete">🗑 삭제</button>
        <button class="btn btn-secondary" id="btn-bulk-cancel">취소</button>
      </div>
    </div>
    <div id="sidebar-scroll">
      <div id="folder-dropdown" class="folder-dropdown" style="display:none">
        <div id="folder-list"></div>
        <button class="folder-add-btn" id="btn-folder-add">+ 새 폴더</button>
      </div>
      <div id="memo-list"></div>
    </div>
    <div id="sidebar-footer">
      <button id="btn-master-pw">Master</button>
      <button id="btn-trash">🗑 휴지통</button>
      <button id="btn-logout">로그아웃</button>
    </div>
  </aside>

  <main id="editor-area">
    <div id="editor-toolbar" style="display:none">
      <div id="toolbar-buttons">
        <div id="folder-select-wrap">
          <button class="btn-icon" id="btn-folder-select" title="폴더 선택">📁</button>
          <div id="folder-select-dropdown" style="display:none">
            <div id="folder-select-list"></div>
          </div>
        </div>
        <div id="template-wrap">
          <button class="btn-icon" id="btn-template" title="템플릿">📄</button>
          <div id="template-dropdown" style="display:none">
            <div id="template-list"></div>
            <button class="template-action-btn" id="btn-template-save">+ 현재 메모를 템플릿으로 저장</button>
          </div>
        </div>
        <div id="toolbar-right">
          <button class="btn-icon" id="btn-copy" title="복사">📋</button>
          <button class="btn-icon" id="btn-undo" title="되돌리기">↩</button>
          <button class="btn-icon" id="btn-redo" title="되살리기" style="display:none">↪</button>
          <button class="btn-icon" id="btn-viewer" title="보기 모드">📖</button>
          <button class="btn-icon" id="btn-find" title="찾기/바꾸기">🔍</button>
          <button class="btn-icon" id="btn-share" title="공유" style="display:none">📤</button>
          <button class="btn-icon toolbar-extra" id="btn-fav" title="즐겨찾기">☆</button>
          <button class="btn-icon toolbar-extra" id="btn-delete" title="삭제">🗑</button>
        </div>
        <button class="btn-icon" id="btn-toolbar-more" title="더보기">︙</button>
      </div>
      <input type="text" id="memo-title-input" placeholder="제목을 입력해 주세요" autocomplete="off">
      <div id="memo-dates" style="display:none">
        <span id="memo-dates-text"></span>
        <button id="btn-help" type="button" title="사용 도움말·팁">도움말</button>
      </div>
    </div>
    <button id="toolbar-reveal" type="button" title="메뉴 펼치기">▼</button>
    <div id="find-replace-bar" style="display:none">
      <div class="find-row">
        <input type="text" id="find-input" placeholder="찾기">
        <button class="btn-sm" id="find-btn">찾기</button>
        <button class="btn-sm" id="find-all-btn">모두</button>
        <span id="find-count"></span>
        <button class="btn-sm" id="find-prev">▲</button>
        <button class="btn-sm" id="find-next">▼</button>
      </div>
      <div class="find-row">
        <input type="text" id="replace-input" placeholder="바꾸기">
        <button class="btn-sm" id="replace-one">바꾸기</button>
      </div>
    </div>
    <div id="editor-container" style="display:none">
      <div id="editor-highlight"></div>
      <textarea id="editor" placeholder="Hello, there?"></textarea>
    </div>
    <div id="char-count" style="display:none"></div>
    <div id="empty-state">
      <div class="icon">📝</div>
      <div>There you are!</div>
    </div>
  </main>
</div>

<div id="login-screen">
  <h1>Moon's Notes</h1>
  <p>Dropbox와 동기화되는 개인 메모 앱입니다. 로그인하여 시작하세요.</p>
  <button class="btn-dropbox" id="btn-login">Dropbox로 로그인</button>
  <p style="font-size:0.8rem; color:#666; margin-top:20px;">
    오프라인 모드로도 사용 가능합니다.<br>
    <a href="#" id="btn-offline" style="color:var(--accent)">오프라인으로 시작</a>
  </p>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>

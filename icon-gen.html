<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<div id="status">Generating...</div>
<a id="dl192" style="display:block;margin:10px">Download 192</a>
<a id="dl512" style="display:block;margin:10px">Download 512</a>
<script>
async function generate() {
  const svgText = await fetch('favicon.svg').then(r => r.text());
  const blob = new Blob([svgText], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    for (const size of [192, 512]) {
      const canvas = document.getElementById('c' + size);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      const dataUrl = canvas.toDataURL('image/png');
      const dl = document.getElementById('dl' + size);
      dl.href = dataUrl;
      dl.download = 'icon-' + size + '.png';
      dl.textContent = 'Download icon-' + size + '.png';
    }
    document.getElementById('status').textContent = 'Done! Right-click canvases or use links to save.';
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
generate();
</script>
</body></html>

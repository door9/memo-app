<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b91c4a"/>
      <stop offset="100%" stop-color="#7a0c2e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f0eb"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e0d8"/>
      <stop offset="100%" stop-color="#d5cbc0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 메모 용지 그림자 + 본체 -->
  <g filter="url(#shadow)">
    <path d="M128 72 L336 72 L384 120 L384 440 Q384 448 376 448 L136 448 Q128 448 128 440 Z" fill="url(#paper)"/>
  </g>

  <!-- 접힌 모서리 -->
  <path d="M336 72 L336 112 Q336 120 344 120 L384 120 Z" fill="url(#fold)" filter="url(#inner-shadow)"/>

  <!-- 텍스트 라인들 -->
  <rect x="168" y="168" width="176" height="10" rx="5" fill="#990f3d" opacity="0.55"/>
  <rect x="168" y="208" width="152" height="10" rx="5" fill="#c4a07c" opacity="0.4"/>
  <rect x="168" y="248" width="168" height="10" rx="5" fill="#c4a07c" opacity="0.35"/>
  <rect x="168" y="288" width="128" height="10" rx="5" fill="#c4a07c" opacity="0.3"/>
  <rect x="168" y="328" width="144" height="10" rx="5" fill="#c4a07c" opacity="0.25"/>

  <!-- 연필 장식 -->
  <g transform="translate(340, 340) rotate(45)">
    <rect x="-6" y="-80" width="12" height="70" rx="2" fill="#e6a817" opacity="0.9"/>
    <rect x="-6" y="-80" width="12" height="14" rx="2" fill="#c48a10"/>
    <polygon points="-6,-10 6,-10 0,6" fill="#f5deb3"/>
    <rect x="-6" y="-82" width="12" height="6" rx="1" fill="#cd7f7f" opacity="0.8"/>
  </g>
</svg>
